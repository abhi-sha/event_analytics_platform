services:

  redis:
    image: redis:7
    container_name: event_platform_redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:15
    container_name: event_platform_postgres
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    restart: always